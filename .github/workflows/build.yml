name: Build Mora

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Install Android platform and NDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Build Rust daemon
        run: |
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"
          export AR_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          cargo build --release --target aarch64-linux-android

      - name: Build Android app
        run: gradle :app:assembleDebug --no-daemon

      - name: Package Magisk module
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk" \
          RUST_BIN="target/aarch64-linux-android/release/perf_daemon" \
          ZIP_NAME="mora_perf_deamon-${GITHUB_SHA}.zip" \
          ./scripts/package_magisk.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mora-build
          path: |
            dist/*.zip
            target/aarch64-linux-android/release/perf_daemon
            app/build/outputs/apk/debug/app-debug.apk
