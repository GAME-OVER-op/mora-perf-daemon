name: Build Mora

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Install Android platform and NDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Build Rust daemon
        run: |
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"
          export AR_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          cargo build --release --target aarch64-linux-android

      - name: Generate debug keystore for release signing
        run: |
          mkdir -p "$RUNNER_TEMP/mora-signing"
          keytool -genkeypair \
            -keystore "$RUNNER_TEMP/mora-signing/debug-release.keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "MORA_RELEASE_KEYSTORE=$RUNNER_TEMP/mora-signing/debug-release.keystore" >> "$GITHUB_ENV"
          echo "MORA_RELEASE_KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"
          echo "MORA_RELEASE_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
          echo "MORA_RELEASE_KEY_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Build release Android app
        run: gradle :app:assembleRelease --no-daemon

      - name: Verify APK signature schemes
        run: |
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify \
            --verbose \
            --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Download flash images
        env:
          RELEASE_API_URL: https://api.github.com/repos/GAME-OVER-op/mora-perf-daemon/releases/tags/Files
        run: |
          set -euo pipefail
          mkdir -p magisk/images

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "$RELEASE_API_URL" \
            -o "$RUNNER_TEMP/mora-files-release.json"

          python3 - <<'PY' > "$RUNNER_TEMP/mora-image-urls.env"
          import json
          import os
          import re
          from pathlib import Path

          data = json.loads(Path(os.environ["RUNNER_TEMP"], "mora-files-release.json").read_text())
          assets = data.get("assets", [])

          def find_asset(output_name, *patterns):
              for pattern in patterns:
                  rx = re.compile(pattern, re.IGNORECASE)
                  for asset in assets:
                      name = asset.get("name", "")
                      if rx.search(name):
                          print(f"{output_name}={asset['browser_download_url']}")
                          print(f"{output_name}_NAME={name}")
                          return
              names = "\n".join(f"- {asset.get('name', '')}" for asset in assets) or "- <no assets>"
              raise SystemExit(f"Could not find {output_name}. Available release assets:\n{names}")

          find_asset(
              "VENDOR_BOOT_OC_URL",
              r"^vendor_boot_oc\.img$",
              r"^vendor_boot_os\.img$",
              r"vendor[_-]?boot.*oc.*\.img$",
              r"vendor[_-]?boot.*os.*\.img$",
              r"vendor[_-]?boot.*overclock.*\.img$",
          )
          find_asset("ORANGEFOX_RECOVERY_URL", r"^orangefox_recovery\.img$", r"orangefox.*recovery.*\.img$", r"orangefox.*\.img$")
          PY

          source "$RUNNER_TEMP/mora-image-urls.env"
          echo "Downloading $VENDOR_BOOT_OC_NAME"
          curl -fL --retry 5 --retry-delay 2 --connect-timeout 30 \
            "$VENDOR_BOOT_OC_URL" \
            -o magisk/images/vendor_boot_oc.img

          echo "Downloading $ORANGEFOX_RECOVERY_NAME"
          curl -fL --retry 5 --retry-delay 2 --connect-timeout 30 \
            "$ORANGEFOX_RECOVERY_URL" \
            -o magisk/images/orangefox_recovery.img

          test -s magisk/images/vendor_boot_oc.img
          test -s magisk/images/orangefox_recovery.img
          ls -lh magisk/images

      - name: Package Magisk module
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk" \
          RUST_BIN="target/aarch64-linux-android/release/perf_daemon" \
          ZIP_NAME="mora_perf_deamon-${GITHUB_SHA}.zip" \
          ./scripts/package_magisk.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mora-build
          path: |
            dist/*.zip
            target/aarch64-linux-android/release/perf_daemon
            app/build/outputs/apk/release/app-release.apk
